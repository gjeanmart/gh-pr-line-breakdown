<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PR Line Breakdown</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #1f2328;
      background: #fff;
      margin: 0;
      padding: 16px;
      width: 260px;
    }
    h2 { font-size: 15px; margin: 0 0 6px; }
    p { margin: 0 0 14px; color: #656d76; line-height: 1.5; }
    .btn {
      display: block;
      width: 100%;
      padding: 7px 0;
      background: #f6f8fa;
      color: #0969da;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      text-align: center;
    }
    .btn:hover { background: #ddf4ff; }
  </style>
</head>
<body>
  <h2>&#128202; PR Line Breakdown</h2>
  <p>Categorizes changed lines in GitHub PRs using configurable glob patterns.</p>
  <button id="btn-options" class="btn">Open Options</button>
  <script type="module" src="popup.js"></script>
</body>
</html>
